server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log off;

    # SPA-style: любой неизвестный путь отдаём index.html
    # (на будущее, если появится client-side router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ассеты с хешем в имени — кэшируем агрессивно
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — без кеша, чтобы обновления подхватывались сразу
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
