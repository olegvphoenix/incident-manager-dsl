server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Гасим access-логи нагрузочные, оставляем error
    access_log off;

    # ---- /configurator/ — отдельный SPA внутри того же контейнера ----
    # Vite-сборка configurator-web с base = /configurator/, ассеты лежат в
    # /configurator/assets/. SPA-фолбэк ведёт на /configurator/index.html.
    location ^~ /configurator/ {
        try_files $uri $uri/ /configurator/index.html;
    }

    location = /configurator/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ^~ /configurator/assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- runner-web (корень) ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
