server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Гасим логи нагрузочные, оставляем error
    access_log off;

    # SPA-style: любой неизвестный путь отдаём index.html (на будущее, если будет роутинг)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэшируем ассеты надолго (они с хешем в имени)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Без кеша на index.html, чтобы обновления подхватывались сразу
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
